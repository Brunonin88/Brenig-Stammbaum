<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0C06"/>
      <stop offset="100%" stop-color="#0E0704"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A32A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A32A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  
  <!-- Decorative border -->
  <rect x="20" y="20" width="472" height="472" rx="65" fill="none" 
        stroke="#C9A32A" stroke-width="2" opacity="0.4"/>
  <rect x="30" y="30" width="452" height="452" rx="58" fill="none" 
        stroke="#C9A32A" stroke-width="1" opacity="0.2"/>

  <!-- Tree trunk -->
  <rect x="248" y="290" width="16" height="120" fill="#C9A32A" opacity="0.8" rx="3"/>
  
  <!-- Tree branches -->
  <path d="M256 290 Q200 250 150 220" stroke="#C9A32A" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M256 290 Q310 250 360 220" stroke="#C9A32A" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M256 250 Q220 215 190 190" stroke="#C9A32A" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M256 250 Q290 215 320 190" stroke="#C9A32A" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M256 220 Q256 190 256 170" stroke="#C9A32A" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Node dots -->
  <circle cx="150" cy="220" r="7" fill="#E8C75A" opacity="0.9"/>
  <circle cx="360" cy="220" r="7" fill="#E8C75A" opacity="0.9"/>
  <circle cx="190" cy="190" r="6" fill="#C9A32A" opacity="0.8"/>
  <circle cx="320" cy="190" r="6" fill="#C9A32A" opacity="0.8"/>
  <circle cx="256" cy="170" r="8" fill="#E8C75A" opacity="1"/>
  <circle cx="256" cy="290" r="9" fill="#C9A32A" opacity="1"/>
  
  <!-- Root nodes -->
  <circle cx="256" cy="410" r="7" fill="#8A7050" opacity="0.7"/>
  <path d="M256 410 Q230 420 210 430" stroke="#8A7050" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M256 410 Q280 420 300 430" stroke="#8A7050" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="210" cy="430" r="5" fill="#8A7050" opacity="0.5"/>
  <circle cx="300" cy="430" r="5" fill="#8A7050" opacity="0.5"/>
  
  <!-- Letter B as decorative initial -->
  <text x="256" y="160" font-family="Georgia, serif" font-size="28" font-weight="bold"
        fill="#E8C75A" text-anchor="middle" letter-spacing="2" opacity="0.9">✦</text>
  
  <!-- Bottom text -->
  <text x="256" y="490" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#C9A32A" text-anchor="middle" letter-spacing="4" opacity="0.8">BRENIG</text>
</svg>
